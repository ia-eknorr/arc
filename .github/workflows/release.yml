name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  validate-changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check CHANGELOG.md contains this version
        run: |
          VERSION="${GITHUB_REF_NAME}"
          if ! grep -q "## \[${VERSION}\]" CHANGELOG.md; then
            echo "ERROR: No entry for ${VERSION} found in CHANGELOG.md"
            echo "Add a '## [${VERSION}] - YYYY-MM-DD' section before releasing."
            exit 1
          fi
          echo "CHANGELOG.md entry for ${VERSION} found."

  test:
    runs-on: ubuntu-latest
    needs: validate-changelog
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: install
        run: pip install -e ".[dev]"

      - name: lint
        run: ruff check src/ tests/

      - name: test
        run: pytest --tb=short --ignore=tests/test_tui

  deploy-docs:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: install
        run: npm ci

      - name: build
        run: npm run build

      - name: upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build

      - name: deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
